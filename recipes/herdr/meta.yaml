{% set name = "herdr" %}
{% set version = "0.7.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/ogulcancelik/herdr/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 0a9b4ba7fe5cccec0abddd3b0ff140ccbb722a3f9a09a6a0c22e35dea4c8ba06

build:
  number: 0
  ignore_run_exports:
    - libstdcxx

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - rust
    - zig >=0.15.2,<0.16

test:
  commands:
    - test -x ${PREFIX}/bin/herdr
    - herdr --version
    - herdr --help
    - herdr --default-config > /dev/null

about:
  home: https://herdr.dev
  summary: Terminal workspace manager for AI coding agents
  license: AGPL-3.0-or-later
  license_file: LICENSE
  dev_url: https://github.com/ogulcancelik/herdr
