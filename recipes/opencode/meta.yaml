{% set name = "opencode" %}
{% set version = "1.16.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://github.com/anomalyco/opencode/archive/refs/tags/v{{ version }}.tar.gz
    sha256: 2e120adae7dcc6992772ddabdafef9210a16f56df4484a209f879618b16054df
    patches:
      - 0001-relax-bun-version-check.patch
  - url: https://models.dev/api.json
    sha256: 11a1da54c2fe41b11937d4186c0687fa5071914fa06e8f1a8527b91c1f3b9640
    fn: models-dev-api.json
  - path: opencode-node_modules-linux-x64-1.16.2.tar.xz
    sha256: 820b7f4b941d4c77161e7a158c2ed66f0b5fabd11f6398691490ac8a07b6137d

build:
  number: 2

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - bun >=1.3.11
    - make
    - nodejs >=20
    - openssl
    - pkg-config
    - python
    - setuptools
  run:
    - c-ares >=1.34.6,<2.0a0
    - hdrhistogram-c >=0.11.9,<0.11.10.0a0
    - icu >=75.1,<76.0a0
    - libarchive >=3.8.7,<3.9.0a0
    - libbrotlicommon >=1.2.0,<1.3.0a0
    - libbrotlidec >=1.2.0,<1.3.0a0
    - libbrotlienc >=1.2.0,<1.3.0a0
    - libdeflate >=1.25,<1.26.0a0
    - libhwy >=1.4.0,<1.5.0a0
    - libsqlite >=3.53.1,<4.0a0
    - libzlib >=1.3.2,<2.0a0
    - lol-html >=2.9.0,<2.9.1.0a0
    - ls-hpack >=2.3.5,<2.3.6.0a0
    - ripgrep
    - zstd >=1.5.7,<1.6.0a0

test:
  commands:
    - test -x ${PREFIX}/bin/opencode
    - test -f ${PREFIX}/share/opencode/schema.json
    - opencode --version
    - opencode --help
    - opencode completion bash

about:
  home: https://opencode.ai
  summary: Open source AI coding agent
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/anomalyco/opencode
