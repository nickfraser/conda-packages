{% set name = "disktui" %}
{% set version = "1.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/mkbula/disktui/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 671b757199e3a3f62a2a2a597a77ea05a7c2f1d2fb7609f0e9b530a69ea633fe

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - rust >=1.85

test:
  commands:
    - test -x ${PREFIX}/bin/disktui
    - test -x ${PREFIX}/bin/disktui-helper
    - disktui-helper < /dev/null

about:
  home: https://github.com/mkbula/disktui
  summary: Terminal-based disk management utility
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/mkbula/disktui
